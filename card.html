<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito</title>
<style>
body{background:#0f0f0f;color:white;font-family:Arial;padding:20px}
.item{margin-bottom:10px}
button{padding:5px;margin-left:10px}
</style>
</head>
<body>

<h2>Carrito</h2>
<div id="cartItems"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  cart.forEach((item,index)=>{
    container.innerHTML += `
    <div class="item">
      ${item.name} x${item.qty}
      <button onclick="remove(${index})">Eliminar</button>
    </div>`;
  });
}

function remove(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

renderCart();
</script>

</body>
</html>
