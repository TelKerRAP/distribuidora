<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribuidora Mayorista PRO</title>

<style>
body{margin:0;font-family:'Segoe UI',Arial;background:linear-gradient(135deg,#0f0f0f,#1c1c1c);color:#fff}

header{
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:rgba(20,20,20,.9);
backdrop-filter:blur(10px);
box-shadow:0 4px 20px rgba(0,0,0,.5);
position:relative;
}

.cart{
position:absolute;
right:20px;
cursor:pointer;
font-size:18px;
}

.badge{
background:#4caf50;
border-radius:50%;
padding:2px 7px;
margin-left:5px;
font-size:12px;
}

input{padding:10px;width:100%;margin-top:5px;border-radius:10px;border:none;background:#1f1f1f;color:white}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}

.card{background:linear-gradient(145deg,#1a1a1a,#222);padding:18px;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.6);transition:.25s}
.card:hover{transform:translateY(-6px) scale(1.02)}

.card img{width:100%;border-radius:12px;margin-bottom:10px}

button{border:none;border-radius:10px;padding:10px;cursor:pointer;font-weight:bold}
.add{width:100%;background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff;margin-top:10px}
</style>
</head>

<body>

<header>
<h2>Distribuidora PRO</h2>

<div class="cart" onclick="goToCart()">
🛒 <span class="badge" id="cartCount">0</span>
</div>
</header>

<input type="text" id="search" placeholder="Buscar productos..." onkeyup="filterProducts()">

<div class="grid" id="productList"></div>

<script>

/* PRODUCTOS */
const products=[
{id:1,name:"Bolsa de Panel",img:"https://via.placeholder.com/300",link:"Kraft.html"},
{id:2,name:"Smartwatch Pro",img:"https://via.placeholder.com/300",link:"smartwatch.html"},
{id:3,name:"Cargador Rápido",img:"https://via.placeholder.com/300",link:"cargador.html"},
{id:4,name:"Bocina Portátil",img:"https://via.placeholder.com/300",link:"bocina.html"},
];

/* 🛒 CARRITO GLOBAL */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function updateCartCount(){
  document.getElementById("cartCount").innerText = cart.length;
}

/* AGREGAR PRODUCTO */
function addToCart(product){
  const item = cart.find(i => i.id === product.id);

  if(item){
    item.qty++;
  }else{
    cart.push({...product, qty:1});
  }

  saveCart();
  updateCartCount();
  alert("Agregado al carrito 🛒");
}

/* IR AL CARRITO */
function goToCart(){
  window.location.href = "cart.html";
}

/* RENDER */
function renderProducts(list){
const container=document.getElementById("productList");
container.innerHTML="";

list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>

<button class="add" onclick='addToCart(${JSON.stringify(p)})'>
Agregar al carrito
</button>

<button class="add" onclick="goToProduct('${p.link}')">
Ver producto
</button>

</div>`;
});
}

/* REDIRECCIÓN */
function goToProduct(link){
  window.location.href = link;
}

/* BUSCADOR */
function filterProducts(){
  const value = document.getElementById("search").value.trim().toLowerCase();

  if(value === ""){
    renderProducts(products);
    return;
  }

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  renderProducts(filtered);
}

/* INIT */
renderProducts(products);
updateCartCount();

</script>

</body>
</html>
