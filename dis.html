<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribuidora Mayorista PRO</title>

<style>
body{margin:0;font-family:'Segoe UI',Arial;background:linear-gradient(135deg,#0f0f0f,#1c1c1c);color:#fff}

header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:rgba(20,20,20,.9);backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.5)}

.cart-btn{position:relative}
.badge{position:absolute;top:-5px;right:-5px;background:#4caf50;color:#fff;border-radius:50%;padding:3px 7px;font-size:12px}

input,select{padding:10px;width:100%;margin-top:5px;border-radius:10px;border:none;background:#1f1f1f;color:white}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}

.card{background:linear-gradient(145deg,#1a1a1a,#222);padding:18px;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.6);transition:.25s}
.card:hover{transform:translateY(-6px) scale(1.02)}

.card img{width:100%;border-radius:12px;margin-bottom:10px}

button{border:none;border-radius:10px;padding:8px;cursor:pointer;font-weight:bold}
.add{width:100%;background:linear-gradient(135deg,#4caf50,#2e7d32);color:#fff;margin-top:10px}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.3s}
.overlay.active{opacity:1;pointer-events:auto}

.cart{position:fixed;top:0;right:-320px;width:300px;height:100%;background:linear-gradient(145deg,#111,#1a1a1a);padding:15px;border-radius:20px 0 0 20px;box-shadow:-10px 0 30px rgba(0,0,0,.8);overflow-y:auto;transition:.35s}
.cart.active{right:0}

.cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

.cart-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px}

.qty{display:flex;gap:5px}
.qty button{background:#333;color:white;padding:2px 6px}

.remove{background:#ff5252;color:white;padding:2px 6px}

.total{margin-top:10px;font-weight:bold}

@media(max-width:600px){
.cart{width:100%}
}
</style>
</head>

<body>

<header>
<h2>Distribuidora PRO</h2>
<button class="cart-btn" onclick="toggleCart()">
🛒
<span class="badge" id="cartCount">0</span>
</button>
</header>

<input type="text" id="search" placeholder="Buscar productos..." onkeyup="filterProducts()">

<div class="grid" id="productList"></div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">
<div class="cart-header">
<h3>Carrito</h3>
<button onclick="toggleCart()">✕</button>
</div>

<div id="cartItems"></div>
<div class="total" id="total"></div>
<button class="add" onclick="sendWhatsApp()">Finalizar Pedido</button>
</div>

<script>
const products=[
{id:1,name:"Audífonos Bluetooth",price:80,img:"https://via.placeholder.com/300"},
{id:2,name:"Smartwatch Pro",price:150,img:"https://via.placeholder.com/300"},
{id:3,name:"Cargador Rápido",price:40,img:"https://via.placeholder.com/300"},
{id:4,name:"Bocina Portátil",price:95,img:"https://via.placeholder.com/300"},


];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));}

function getPrice(qty,base){
if(qty>=50)return base*0.7;
if(qty>=10)return base*0.85;
return base;
}

function renderProducts(list){
const container=document.getElementById("productList");
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>Desde $${p.price}</p>

<label>Color:</label>
<select id="color-${p.id}">
<option>Negro</option>
<option>Blanco</option>
<option>Rojo</option>
</select>

<label>Piezas:</label>
<input type="number" id="qty-${p.id}" value="1" min="1">

<button class="add" onclick="addToCart(${p.id})">Agregar</button>
</div>`;
});
}

function addToCart(id){
const product=products.find(p=>p.id===id);
const color=document.getElementById(`color-${id}`).value;
const qty=parseInt(document.getElementById(`qty-${id}`).value);

const item=cart.find(i=>i.id===id && i.color===color);

if(item){
item.qty+=qty;
}else{
cart.push({...product,qty:qty,color:color});
}

updateCart();
}

function changeQty(id,delta,color){
const item=cart.find(i=>i.id===id && i.color===color);
item.qty+=delta;

if(item.qty<=0){
cart=cart.filter(i=>!(i.id===id && i.color===color));
}

updateCart();
}

function removeItem(id,color){
cart=cart.filter(i=>!(i.id===id && i.color===color));
updateCart();
}

function updateCart(){
const container=document.getElementById("cartItems");
const count=document.getElementById("cartCount");
const totalEl=document.getElementById("total");

container.innerHTML="";
let total=0;

cart.forEach(item=>{
const price=getPrice(item.qty,item.price);
total+=price*item.qty;

container.innerHTML+=`
<div class="cart-item">
<div>
<span>${item.name}</span><br>
<small>${item.color}</small>
</div>
<div class="qty">
<button onclick="changeQty(${item.id},-1,'${item.color}')">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${item.id},1,'${item.color}')">+</button>
<button class="remove" onclick="removeItem(${item.id},'${item.color}')">X</button>
</div>
</div>`;
});

count.innerText=cart.length;
totalEl.innerText="Total: $"+Math.round(total);

saveCart();
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function filterProducts(){
const value=document.getElementById("search").value.toLowerCase();
renderProducts(products.filter(p=>p.name.toLowerCase().includes(value)));
}

function sendWhatsApp(){
let msg="Hola, quiero hacer este pedido:%0A";
let total=0;

cart.forEach(i=>{
const price=getPrice(i.qty,i.price);
total+=price*i.qty;
msg+=`- ${i.name} (${i.color}) x${i.qty} ($${price})%0A`;
});

msg+=`%0ATotal: $${Math.round(total)}`;
window.open(`https://wa.me/521XXXXXXXXXX?text=${msg}`);
}

renderProducts(products);
updateCart();
</script>

</body>
</html>
